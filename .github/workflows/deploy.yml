# Этот файл используется для деплоя на сервер.
# Для локальной разработки используйте:
# docker compose -f compose.yml -f compose.monitoring.yml up -d

name: Deploy to Production

on:
  push:
    branches:
      - master # Деплой только при пуше в master
  workflow_dispatch: # Ручной запуск из UI GitHub Actions

# Переменные окружения (доступны во всех шагах)
env:
  DEPLOY_PATH: /home/${{ secrets.SSH_USER }}/monitoring
  DEPLOY_COMMIT: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # GitHub Environment для защиты деплоя

    steps:
      # Шаг 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Ускоряем checkout — полная история не нужна

      # Шаг 2: Валидация Compose конфигов
      - name: Validate compose.yml
        run: |
          # Создается временный .env для валидации
          cat > .env << 'EOF'
          COMPOSE_PROJECT_NAME=monitoring
          SERVER_HOST=localhost
          NGINX_HTTP_PORT=80
          POSTGRES_USER=test
          POSTGRES_DB=test
          GRAFANA_ADMIN_USER=admin
          GRAFANA_PORT=3000
          PROMETHEUS_PORT=9090
          NODE_EXPORTER_PORT=9100
          CADVISOR_PORT=8081
          ADMINER_PORT=8080
          EOF
          # Заглушки секретов (только для проверки синтаксиса)
          mkdir -p secrets
          for f in postgres_password grafana_admin_password telegram_token telegram_chat_id nginx_htpasswd; do
            echo "dummy" > secrets/$f
          done

          # Валидация базовой конфигурации
          docker compose -f compose.yml config --quiet
          echo "✅ compose.yml валиден"

      - name: Validate compose.monitoring.yml
        run: |
          docker compose -f compose.yml -f compose.monitoring.yml config --quiet
          echo "✅ compose.monitoring.yml валиден"

      - name: Validate compose.debug.yml
        run: |
          docker compose -f compose.yml -f compose.debug.yml config --quiet
          echo "✅ compose.debug.yml валиден"

      # Шаг 3: Валидация Prometheus и Alertmanager
      - name: Validate Prometheus config with promtool
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "${{ github.workspace }}/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.45.0 \
            check config /etc/prometheus/prometheus.yml
          echo "Prometheus config валиден"

      - name: Validate Alertmanager config with amtool
        run: |
          docker run --rm \
            --entrypoint /bin/amtool \
            -v "${{ github.workspace }}/alertmanager:/etc/alertmanager:ro" \
            prom/alertmanager:v0.31.0 \
            check-config /etc/alertmanager/alertmanager.yml
          echo "Alertmanager config валиден"

      # Шаг 4: Валидация Nginx конфига
      - name: Validate Nginx configuration
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "${{ github.workspace }}/nginx/html:/usr/share/nginx/html:ro" \
            nginx:1.25-alpine \
            nginx -t
          echo "Nginx config валиден"

      # Шаг 5: Деплой на сервер через SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3

        # Маппинг GitHub Secrets → переменные окружения SSH-сессии
        env:
          DEPLOY_POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          DEPLOY_POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DEPLOY_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DEPLOY_GRAFANA_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          DEPLOY_GRAFANA_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          DEPLOY_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEPLOY_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          DEPLOY_BASIC_AUTH_PASS: ${{ secrets.BASIC_AUTH_PASS }}
          DEPLOY_COMMIT: ${{ github.sha }}

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Секреты передаются как переменные окружения SSH-сессии
          # Значения не попадают в логи GitHub Actions
          envs: DEPLOY_POSTGRES_USER,DEPLOY_POSTGRES_DB,DEPLOY_POSTGRES_PASSWORD,DEPLOY_GRAFANA_USER,DEPLOY_GRAFANA_PASSWORD,DEPLOY_TELEGRAM_TOKEN,DEPLOY_TELEGRAM_CHAT_ID,DEPLOY_BASIC_AUTH_USER,DEPLOY_BASIC_AUTH_PASS,DEPLOY_COMMIT

          script: |
            # Строгий режим: остановка при ошибке, проверка переменных
            set -euo pipefail

            echo "Деплой начат: $(date '+%Y-%m-%d %H:%M:%S')"

            # Переход в папку проекта
            cd ${{ env.DEPLOY_PATH }}

            # Получение нового кода
            git fetch origin master
            git reset --hard origin/master
            echo "✅ Код синхронизирован с origin/master: $(git rev-parse --short HEAD)"

            # Создание папку для секретов
            mkdir -p secrets
            chmod 700 secrets

            # Запись секретов (printf без newline в конце)
            printf '%s' "$DEPLOY_POSTGRES_PASSWORD" > secrets/postgres_password
            printf '%s' "$DEPLOY_GRAFANA_PASSWORD"  > secrets/grafana_admin_password
            printf '%s' "$DEPLOY_TELEGRAM_TOKEN"    > secrets/telegram_token
            printf '%s' "$DEPLOY_TELEGRAM_CHAT_ID"  > secrets/telegram_chat_id

            # Генерация htpasswd
            docker run --rm httpd:alpine \
              htpasswd -nbB "$DEPLOY_BASIC_AUTH_USER" "$DEPLOY_BASIC_AUTH_PASS" \
              > secrets/nginx_htpasswd

            # Права 644 — только владелец читает
            chmod 644 secrets/*
            echo "✅ Секреты обновлены"

            # Создание .env (перезаписываются полностью для актуальности)
            cat > .env << EOF
            COMPOSE_PROJECT_NAME=monitoring
            SERVER_HOST=${{ secrets.SSH_HOST }}
            NGINX_HTTP_PORT=80
            POSTGRES_USER=${DEPLOY_POSTGRES_USER}
            POSTGRES_DB=${DEPLOY_POSTGRES_DB}
            GRAFANA_ADMIN_USER=${DEPLOY_GRAFANA_USER}
            GRAFANA_PORT=3000
            PROMETHEUS_PORT=9090
            NODE_EXPORTER_PORT=9100
            CADVISOR_PORT=8081
            ADMINER_PORT=8080
            EOF
            chmod 644 .env  # .env не содержит паролей, но ограничиваем запись
            echo ".env обновлён"

            # Скачивание образов и запуск контейнеров
            docker compose -f compose.yml -f compose.monitoring.yml pull
            docker compose -f compose.yml -f compose.monitoring.yml up -d --remove-orphans
            echo "Образы скачены, контейнеры запущены"

            # Ожидание готовности сервисов (перекрывает start_period)
            echo "⏳ Ожидание готовности сервисов (60 сек)..."
            sleep 60

            # Проверка статуса контейнеров
            if docker compose -f compose.yml -f compose.monitoring.yml ps | grep -q "unhealthy"; then
              echo "❌ unhealthy containers"
              docker compose -f compose.yml -f compose.monitoring.yml ps
              exit 1
            fi

            echo "services OK"

            # Smoke тест
            wait_for_url() {
              local url="$1" 
              local ok_codes="$2"

              for i in {1..30}; do
                code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
                
                if [[ " $ok_codes " == *" $code "* ]]; then
                  echo "✅ $url - $code"
                  return 0
                fi

                if [[ "$code" =~ ^(000|502|503|504)$ ]]; then
                  sleep 2
                  continue
                fi

                echo "❌ $url - $code"
                return 1
              done

                echo "❌ timeout $url"
                return 1
              }

              wait_for_url_auth() {
                local url="$1" 
                local ok_codes="$2"

                for i in {1..30}; do
                  code=$(curl -s -o /dev/null \
                    -u "$DEPLOY_BASIC_AUTH_USER:$DEPLOY_BASIC_AUTH_PASS" \
                    -w "%{http_code}" "$url")

                if [[ " $ok_codes " == *" $code "* ]]; then
                  echo "✅ $url - $code"
                  return 0
                fi

                sleep 2
              done

              echo "❌ timeout $url"
              return 1
            }

            wait_for_url "http://localhost/" "200" || exit 1
            wait_for_url "http://localhost/grafana/" "200 301 302" || exit 1
            wait_for_url "http://localhost/prometheus/" "401" || exit 1
            wait_for_url "http://localhost/alertmanager/" "401" || exit 1
            wait_for_url_auth "http://localhost/prometheus/-/healthy" "200" || exit 1
            wait_for_url_auth "http://localhost/alertmanager/-/healthy" "200"

            # Удаление dangling образов
            docker image prune -f
            echo "Устаревшие образы удалены"

            # Отправка уведомления в Telegram об успешном деплое
            COMMIT_SHORT=${DEPLOY_COMMIT:-unknown}
            COMMIT_SHORT=${COMMIT_SHORT:0:7}

            if [ -n "$DEPLOY_TELEGRAM_TOKEN" ] && [ -n "$DEPLOY_TELEGRAM_CHAT_ID" ]; then
              curl -s -X POST "https://api.telegram.org/bot${DEPLOY_TELEGRAM_TOKEN}/sendMessage" \
                -d "chat_id=${DEPLOY_TELEGRAM_CHAT_ID}" \
                -d "text=✅ Deploy successful%0ACommit: ${COMMIT_SHORT}%0ATime: $(date '+%Y-%m-%d %H:%M:%S')" \
                > /dev/null || true
            fi

            echo "✅ Деплой завершён: $(date '+%Y-%m-%d %H:%M:%S')"

      # Шаг 6: Уведомление о статусе деплоя
      - name: Notify deployment status
        if: always() # Запускается всегда (success/failure)
        run: |
          echo "Статус деплоя: ${{ job.status }}"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Деплой успешен!"
          else
            echo "❌ Деплой провалился! Проверь логи."
          fi
