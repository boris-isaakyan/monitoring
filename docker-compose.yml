# docker-compose.yml

# Deploy:  docker compose --env-file .env up -d         # стандартный запуск
# Debug:   docker compose --profile debug up -d          # запуск с adminer

# YAML ANCHORS — механизм переиспользования блоков без дублирования кода
# &name  — объявление якоря (определяем блок один раз)
# *name  — ссылка на якорь (вставляем блок в нужное место)
# <<:    — merge key, выполняет слияние содержимого якоря в текущий блок

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  # NGINX
  # Единая точка входа для всего внешнего трафика (reverse proxy)
  nginx:
    image: nginx:1.25-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_nginx
    <<: [*default-logging, *default-security]
    cap_add:
      - NET_BIND_SERVICE # слушать порт 80 (< 1024 требует capability)
      - CHOWN # менять владельца рабочих директорий при старте
      - SETUID # мастер-процесс стартует от root, воркеры → nginx
      - SETGID # аналогично SETUID для группы
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # [ИЗМЕНЕНО] монтируем htpasswd через volume (не Docker Secret)
      # nginx читает его напрямую для basic_auth на /prometheus и /alertmanager
      - ./secrets/nginx_htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - frontend # принимает входящий трафик из интернета
      - backend # зарезервировано для проксирования к backend-сервисам
      # [ИЗМЕНЕНО] добавлена сеть monitoring — nginx должен достучаться
      # до grafana и prometheus которые находятся в этой сети
      - monitoring
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        reservations:
          cpus: "0.05"
          memory: 32M

  # POSTGRESQL
  postgres:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_db
    <<: [*default-logging, *default-security]
    cap_add:
      - CHOWN # менять владельца /var/lib/postgresql/data при инициализации
      - SETUID # мастер-процесс стартует от root, воркеры → postgres
      - SETGID # аналогично SETUID для группы
      - DAC_OVERRIDE # переопределение прав при инициализации кластера
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    # [ИЗМЕНЕНО] убрана секция secrets: — uid/gid/mode не поддерживаются
    # в Docker Compose (только в Swarm). Монтируем файл напрямую через volumes
    # с правами 644 на хосте — папка secrets/ защищена chmod 700
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          cpus: "0.25"
          memory: 256M

  # ADMINER
  # Только в debug-режиме: docker compose --profile debug up -d
  adminer:
    image: adminer:4.8.1
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_adminer
    profiles:
      - debug
    <<: [*default-logging, *default-security]
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    user: "82:82"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        reservations:
          cpus: "0.05"
          memory: 32M

  # PROMETHEUS
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_prometheus
    <<: [*default-logging, *default-security]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      # [ИЗМЕНЕНО] добавлены два флага для работы за nginx reverse proxy:
      # web.external-url — Prometheus знает что снаружи он доступен по /prometheus/
      # web.route-prefix — все внутренние маршруты тоже сдвигаются на /prometheus/
      # Это позволяет nginx передавать путь как есть, без rewrite
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/prometheus/"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    # [ИЗМЕНЕНО] ports убраны — Prometheus недоступен снаружи напрямую
    # доступ только через nginx → /prometheus/ с basic_auth
    # [ИЗМЕНЕНО] убраны сети frontend и backend — Prometheus общается
    # только с exporters и alertmanager внутри сети monitoring
    networks:
      - monitoring
    restart: unless-stopped
    user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      # [ИЗМЕНЕНО] путь обновлён с учётом web.route-prefix=/prometheus/
      # теперь health endpoint доступен по /prometheus/-/healthy
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:9090/prometheus/-/healthy",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        reservations:
          cpus: "0.25"
          memory: 256M

  # GRAFANA
  grafana:
    image: grafana/grafana:10.2.2
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_grafana
    <<: [*default-logging, *default-security]
    cap_add:
      - CHOWN # менять владельца /var/lib/grafana при старте
      - SETUID # entrypoint стартует от root → переключается на grafana (472)
      - SETGID # аналогично SETUID для группы
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # [ИЗМЕНЕНО] отключаем проверку обновлений — Grafana пытается
      # достучаться до github.com, но сеть monitoring изолирована (internal: true)
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # [ИЗМЕНЕНО] три переменные для работы за nginx reverse proxy:
      # ROOT_URL — Grafana генерирует ссылки с префиксом /grafana/
      # SERVE_FROM_SUB_PATH — разрешает работу с субпути /grafana/
      # DOMAIN — берём из .env, иначе %(domain)s резолвится в localhost
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: "${SERVER_HOST}"
    # [ИЗМЕНЕНО] убрана секция secrets: — монтируем файл напрямую через volumes
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./secrets/grafana_admin_password:/run/secrets/grafana_admin_password:ro
    # [ИЗМЕНЕНО] ports убраны — Grafana доступна только через nginx → /grafana/
    depends_on:
      prometheus:
        condition: service_healthy
    # [ИЗМЕНЕНО] убрана сеть frontend — Grafana не публикует порты наружу
    # nginx достучится через сеть monitoring
    networks:
      - monitoring
    restart: unless-stopped
    user: "472:472"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 128M

  # NODE EXPORTER
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_node-exporter
    <<: [*default-logging, *default-security]
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
      - /run/udev:/host/run/udev:ro
      # [ИЗМЕНЕНО] добавлен прямой mount /run/udev/data
      # без него node-exporter не может читать расширенные свойства дисков
      # и пишет ошибку "Failed to open directory, disabling udev device properties"
      - /run/udev/data:/run/udev/data:ro
    # [ИЗМЕНЕНО] ports убраны — метрики доступны только Prometheus внутри
    # сети monitoring. Grafana показывает всё через datasource — прямой доступ не нужен
    # [ИЗМЕНЕНО] убрана сеть frontend — node-exporter изолирован
    networks:
      - monitoring
    restart: unless-stopped
    user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:9100/metrics",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        reservations:
          cpus: "0.05"
          memory: 32M

  # CADVISOR
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_cadvisor
    privileged: true # нужен для доступа к cgroup — альтернативы нет
    <<: [*default-logging] # x-security не применяем — конфликтует с privileged
    command:
      - "--docker_only"
      - "--housekeeping_interval=30s"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # [ИЗМЕНЕНО] ports убраны — метрики доступны только Prometheus
    # [ИЗМЕНЕНО] убрана сеть frontend — cadvisor изолирован
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        reservations:
          cpus: "0.05"
          memory: 64M

  # ALERTMANAGER
  alertmanager:
    image: prom/alertmanager:v0.31.0
    container_name: ${COMPOSE_PROJECT_NAME:-webapp}_alertmanager
    <<: [*default-logging, *default-security]
    cap_add:
      - NET_BIND_SERVICE
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--cluster.listen-address="
    # [ИЗМЕНЕНО] убрана секция secrets: — монтируем файлы напрямую через volumes
    # причина: Docker Compose игнорирует uid/gid/mode в secrets (только Swarm)
    # файлы принадлежат 1000:1000, alertmanager запущен от 65534:65534
    # решение: chmod 644 на файлах + монтирование через volumes
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
      - ./secrets/telegram_token:/run/secrets/telegram_token:ro
      - ./secrets/telegram_chat_id:/run/secrets/telegram_chat_id:ro
    # [ИЗМЕНЕНО] ports убраны — Alertmanager доступен только через nginx
    networks:
      - monitoring # получает алерты от Prometheus
      - frontend # ВАЖНО: нужна для исходящих запросов к Telegram API
        # frontend без internal:true — есть выход в интернет
    restart: unless-stopped
    user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:9093/-/healthy",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        reservations:
          cpus: "0.05"
          memory: 32M

# СЕТИ
networks:
  frontend:
    driver: bridge
    # nginx, alertmanager — внешний трафик + исходящий доступ в интернет
    # единственная сеть БЕЗ internal:true

  backend:
    driver: bridge
    internal: true
    # postgres — полная изоляция от интернета
    # доступна только сервисам в этой же сети

  monitoring:
    driver: bridge
    internal: true
    # все сервисы мониторинга изолированы от интернета
    # nginx подключён сюда чтобы проксировать к grafana и prometheus
    # alertmanager подключён к frontend для исходящего доступа к Telegram

# ТОМА
volumes:
  postgres-data: # данные PostgreSQL — потеря = потеря всех данных БД
  prometheus-data: # TSDB Prometheus — метрики за 15 дней
  grafana-data: # данные Grafana — дашборды, пользователи, настройки
  alertmanager-data: # состояние Alertmanager — silences, notification log

# СЕКРЕТЫ
# [ИЗМЕНЕНО] секция сохранена только для nginx_htpasswd
# остальные секреты переведены на прямое монтирование через volumes
# причина: Docker Compose не поддерживает uid/gid/mode (только Docker Swarm)
secrets:
  nginx_htpasswd:
    file: ./secrets/nginx_htpasswd
    # логин:хэш для basic_auth на /prometheus и /alertmanager
    # генерация: docker run --rm httpd:alpine htpasswd -nbB admin your_password
