# user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Скрываем версию Nginx в заголовках ответа
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Docker внутренний DNS — резолвит имена контейнеров
        # valid=30s — кэшируем DNS-ответ 30 секунд
        resolver 127.0.0.11 valid=30s;

        # ─── Статика ──────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
        }

        # ─── Grafana ───────────────────────────────────────────────
        location = /grafana {
            return 301 /grafana/;
        }

        location /grafana/ {
            # set $var — резолвинг при запросе, не при старте nginx
            set $grafana_upstream grafana:3000;
            proxy_pass http://$grafana_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Prometheus ────────────────────────────────────────────
        location = /prometheus {
            return 301 /prometheus/;
        }

        location /prometheus/ {
            auth_basic           "Prometheus — restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            set $prometheus_upstream prometheus:9090;
            proxy_pass http://$prometheus_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Authorization     $http_authorization;
        }
    }
}