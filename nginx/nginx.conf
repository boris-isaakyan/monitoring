# nginx.conf — Reverse proxy для всех сервисов
# sub_filter удалён — используем относительные пути в HTML

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Temp-пути в /tmp для read_only контейнера
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # WebSocket поддержка для Grafana Live
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Скрываем версию nginx
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Docker DNS resolver
        resolver 127.0.0.11 valid=30s;

        # Статика
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # sub_filter удалён — HTML использует относительные пути
        }

        # Grafana
        location = /grafana {
            return 301 /grafana/;
        }

        location /grafana/ {
            set $grafana_upstream grafana:3000;
            proxy_pass http://$grafana_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket для Grafana Live
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;
        }

        # Prometheus
        location = /prometheus {
            return 301 /prometheus/;
        }

        location /prometheus/ {
            auth_basic "Prometheus — restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            set $prometheus_upstream prometheus:9090;
            proxy_pass http://$prometheus_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Alertmanager
        location = /alertmanager {
            return 301 /alertmanager/;
        }

        location /alertmanager/ {
            auth_basic "Alertmanager — restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            set $alertmanager_upstream alertmanager:9093;
            proxy_pass http://$alertmanager_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}