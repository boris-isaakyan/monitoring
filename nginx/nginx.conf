# nginx.conf
#
# Единая точка входа для всего внешнего трафика.
# Reverse proxy для Grafana, Prometheus, Alertmanager.
# sub_filter для подстановки SERVER_HOST в index.html.

# user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Temp-пути в /tmp — обязательно при read_only: true в docker-compose
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # Скрываем версию nginx в заголовках ответа
    # Злоумышленник не узнает версию для подбора эксплойтов
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Docker внутренний DNS — резолвит имена контейнеров
        # valid=30s — кэшируем DNS-ответ 30 секунд
        # Без этого nginx упадёт при старте если контейнер ещё не поднялся
        resolver 127.0.0.11 valid=30s;

        # ─── Статика ──────────────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # [ДОБАВЛЕНО] sub_filter — заменяет плейсхолдер __SERVER_HOST__
            # на реальный хост из заголовка запроса ($host).
            # Это происходит на лету при каждой отдаче index.html —
            # пользователь получает ссылки с реальным IP/доменом сервера.
            #
            # Как работает:
            #   Браузер запрашивает http://192.168.1.111/
            #   nginx читает index.html
            #   заменяет __SERVER_HOST__ → 192.168.1.111
            #   отдаёт пользователю уже с правильными ссылками
            sub_filter '__SERVER_HOST__' '$host';

            # off — заменять все вхождения, не только первое
            sub_filter_once off;

            # [ДОБАВЛЕНО] отключаем gzip-сжатие для этого location —
            # sub_filter не работает со сжатым контентом
            gzip off;
        }

        # ─── Grafana ──────────────────────────────────────────────────────
        location = /grafana {
            # Редирект без trailing slash → с trailing slash
            # Без этого браузер может потерять субпуть
            return 301 /grafana/;
        }

        location /grafana/ {
            # set $var — резолвинг имени контейнера при запросе, не при старте nginx
            # Решает проблему "host not found in upstream" при старте
            set $grafana_upstream grafana:3000;
            proxy_pass http://$grafana_upstream;

            # Передаём реальный IP пользователя в Grafana
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Prometheus ───────────────────────────────────────────────────
        location = /prometheus {
            return 301 /prometheus/;
        }

        location /prometheus/ {
            # basic auth — Prometheus не имеет встроенной аутентификации
            # Файл паролей монтируется из secrets/nginx_htpasswd
            # Генерация: docker run --rm httpd:alpine htpasswd -nbB admin password
            auth_basic           "Prometheus — restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # set $var — отложенный резолвинг DNS
            set $prometheus_upstream prometheus:9090;
            proxy_pass http://$prometheus_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Пробрасываем заголовок Authorization — нужен для basic auth
            proxy_set_header Authorization     $http_authorization;
        }

        # ─── Alertmanager ─────────────────────────────────────────────────
        location = /alertmanager {
            return 301 /alertmanager/;
        }

        location /alertmanager/ {
            # basic auth — тот же файл паролей что и для Prometheus
            auth_basic           "Alertmanager — restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            set $alertmanager_upstream alertmanager:9093;
            proxy_pass http://$alertmanager_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
