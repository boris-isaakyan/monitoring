# alerts.yml — Правила алертов Prometheus

groups:
  # Хост: CPU, RAM, Disk, Load Average
  # Источник метрик: Node Exporter
  - name: node_alerts
    interval: 20s
    rules:
      # Алерт: Высокая загрузка CPU
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Высокая загрузка CPU на {{ $labels.instance }}"
          description: "CPU > 80% в течение 5 минут. Текущее значение: {{ $value | printf \"%.1f\" }}%"
      
      # Алерт: Критическая загрузка CPU
      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Критическая загрузка CPU на {{ $labels.instance }}"
          description: "CPU > 95% в течение 2 минут. Текущее значение: {{ $value | printf \"%.1f\" }}%"

      # Алерт: Высокое использование RAM
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes
          / node_memory_MemTotal_bytes)) * 100 > 80
        for: 30s
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Высокое использование RAM на {{ $labels.instance }}"
          description: "RAM > 80% в течение 5 минут. Текущее значение: {{ $value | printf \"%.1f\" }}%"
      
      # Алерт: Критическое использование RAM
      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Критическое использование RAM на {{ $labels.instance }}"
          description: "RAM > 95% в течение 2 минут. Текущее значение: {{ $value | printf \"%.1f\" }}%"

      # Алерт: Высокий уровень использования диска
      - alert: HighDiskUsage
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{mountpoint="/", fstype!~"tmpfs|overlay|aufs|squashfs"}
              /
              node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay|aufs|squashfs"}
            )
          ) * 100 > 80
        for: 5m                           # диск заполняется постепенно, 5 минут достаточно
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Высокая загрузка диска на {{ $labels.instance }}"
          description: "Диск {{ $labels.mountpoint }} > 80%. Текущее значение: {{ $value | printf \"%.1f\" }}%"

      # Алерт: Критическое использование диска
      - alert: CriticalDiskUsage
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{mountpoint="/", fstype!~"tmpfs|overlay|aufs|squashfs"}
              /
              node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay|aufs|squashfs"}
            )
          ) * 100 > 95
        for: 2m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Критическая загрузка диска на {{ $labels.instance }}"
          description: "Диск {{ $labels.mountpoint }} > 95%. Текущее значение: {{ $value | printf \"%.1f\" }}%"

      # Алерт: Высокая системная нагрузка
      # Порог = 2x количество CPU ядер на хосте
      - alert: HighSystemLoad
        expr: node_load1 > on(instance) (count by(instance) (node_cpu_seconds_total{mode="idle"}) * 2)
        for: 5m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Высокий Load Average на {{ $labels.instance }}"
          description: "Load Average превышает 2x кол-во CPU в течение 5 минут. Значение: {{ $value | printf \"%.2f\" }}"

      # Алерт: Node Exporter недоступен
      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "Node Exporter недоступен"
          description: "Prometheus не получает метрики хоста более 1 минуты"

  # Группа алертов для Docker-контейнеров
  - name: container_alerts
    interval: 15s
    rules:
      # Алерт: Контейнер потребляет много CPU относительно лимита в Docker Compose
      - alert: ContainerHighCPU
        expr: |
          (
            sum by(name) (rate(container_cpu_usage_seconds_total{name!=""}[5m]))
            /
            sum by(name) (container_spec_cpu_quota{name!=""} / container_spec_cpu_period{name!=""})
          ) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: container
        annotations:
          summary: "Высокое потребление CPU контейнером {{ $labels.name }}"
          description: "Контейнер использует > 80% от своего CPU-лимита в течение 5 минут. Значение: {{ $value | printf \"%.1f\" }}%"

      # Алерт: Контейнер потребляет много RAM
      # container_spec_memory_limit_bytes > 0 — защита от деления на ноль
      # (если лимит не задан, значение = 0 или очень большое число)
      - alert: ContainerHighMemory
        expr: |
          (
            container_memory_usage_bytes{name!=""}
            /
            container_spec_memory_limit_bytes{name!=""}
          ) * 100 > 80
          and
          container_spec_memory_limit_bytes{name!=""} > 0
        for: 30s
        labels:
          severity: warning
          component: container
        annotations:
          summary: "Container {{ $labels.name }} high memory"
          description: "Memory usage is {{ $value | printf \"%.2f\" }}% of limit"
      
      # Алерт: Контейнер Контейнер перезапустился (единичный рестарт)
      # changes() считает сколько раз изменился timestamp старта контейнера
      # Окно 5m — достаточно чтобы Prometheus успел поймать событие при scrape_interval: 15s
      - alert: ContainerRestarted
        expr: changes(container_start_time_seconds{container_label_com_docker_compose_service!=""}[1m]) > 0
        for: 0s
        labels:
          severity: warning
          component: container
        annotations:
          summary: "Контейнер {{ $labels.container_label_com_docker_compose_service }} перезапущен"
          description: "Зафиксирован новый запуск процесса в контейнере за последнюю минуту."
      
      # Алерт: CrashLoop (частые рестарты)
      # Если контейнер рестартовал 3+ раз за 15 минут — это уже crash loop
      - alert: ContainerCrashLoop
        expr: changes(container_start_time_seconds{container_label_com_docker_compose_service!=""}[15m]) >= 3
        for: 0s
        labels:
          severity: critical
          component: container
        annotations:
          summary: "Контейнер {{ $labels.container_label_com_docker_compose_service }} в crash loop"
          description: "Контейнер перезапускался {{ $value | printf \"%.0f\" }} раз за последние 15 минут"
  
      # Алерт: Контейнер недоступен
      # cAdvisor перестал видеть контейнер более 30 секунд
      # Покрывает: docker stop, OOM kill, падение процесса
      # name!~"POD|/" — фильтр служебного шума cAdvisor
      - alert: ContainerDown
        expr: time() - container_last_seen{container_label_com_docker_compose_service!=""} > 30
        for: 10s
        labels:
          severity: critical
          component: container
        annotations:
          summary: "Контейнер {{ $labels.container_label_com_docker_compose_service }} недоступен"
          description: "cAdvisor не видит контейнер более 30 секунд. Возможно, он остановлен или удален."

      # Алерт: cAdvisor сам недоступен
      - alert: CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 1m
        labels:
          severity: critical
          component: container
        annotations:
          summary: "cAdvisor недоступен"
          description: "Prometheus не получает метрики контейнеров более 1 минуты"

  # Группа алертов для сервисов (Prometheus targets) из scrape_configs prometheus.yml
  - name: service_alerts
    interval: 15s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 15s
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Target {{ $labels.instance }} is unreachable"