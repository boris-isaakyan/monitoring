# prometheus.yml - Главный конфигурационный файл для Prometheus
# Определяет глобальные параметры, источники сбора метрик и правила алертинга

global:
  scrape_interval: 30s # Опрашивать exporters каждые 30 секунд
  evaluation_interval: 30s # Проверять правила алертов каждые 30 секунд
  scrape_timeout: 10s # Таймаут одного scrape-запроса

# Куда отправлять сработавшие алерты
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      path_prefix: /alertmanager/
      timeout: 30s

# Правила алертов разделены по файлам
rule_files:
  - "/etc/prometheus/alerts/host.yml"
  - "/etc/prometheus/alerts/container.yml"
  - "/etc/prometheus/alerts/service.yml"

# Откуда Prometheus берёт метрики
scrape_configs:
  - job_name: prometheus # Метрики самого Prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter # Метрики хоста (CPU, RAM, Disk, Network)
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor # Метрики Docker-контейнеров
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: alertmanager # Метрики Alertmanager (Позволяет алертить если Alertmanager сам упал)
    metrics_path: /alertmanager/metrics
    static_configs:
      - targets:
          - alertmanager:9093
